<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Cafeteria Yuumel</title>
    <style>
        /* CONFIGURAÇÕES GERAIS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3; /* Rosa claro igual ao index */
            color: #444;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        /* --- DESAFIO 7: SOMBRA NO FORMULÁRIO (CARD) --- */
        main {
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); /* [cite: 13] */
        }

        h1 { color: #d63384; text-align: center; margin-bottom: 5px; }

        form div { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #b02a6a;
        }

        /* --- DESAFIO 9: TRANSIÇÕES NOS INPUTS --- */
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ffc1cf;
            border-radius: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease; /* [cite: 3] */
        }

        /* Pseudo-classe :focus (Desafio 8) */
        input:focus, textarea:focus {
            outline: none;
            border-color: #d63384;
            box-shadow: 0 0 10px rgba(214, 51, 132, 0.2);
            transform: scale(1.01); /* Efeito suave [cite: 3] */
        }

        /* BOTÃO COM ANIMAÇÃO */
        button {
            background-color: #d63384;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease; /* [cite: 3] */
        }

        button:hover {
            background-color: #ff85a1;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
            transform: translateY(-3px); /* [cite: 3] */
        }

        /* --- DESAFIO 7 & 9: LINK DE VOLTA --- */
        nav { text-align: center; margin-top: 30px; }
        
        a { 
            color: #d63384; 
            text-decoration: none; 
            font-weight: bold;
            opacity: 0.6; /* [cite: 14] */
            transition: opacity 0.3s; 
        }

        a:hover { 
            opacity: 1; /* [cite: 14] */
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 20px;">
        <img src="assets/yuumel.png" alt="Logo Yuumel" width="120">
        <h1>Fale com a Yuumel</h1>
        <p>Dúvidas sobre nossos bolos ou cafés? Mande uma mensagem!</p>
    </header>

    <main>
        <form action="#" method="POST">
            <div>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome aqui..." required>
            </div>

            <div>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div>
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva aqui..." required></textarea>
            </div>

            <button type="submit">Enviar Mensagem com Amor 🐾</button>
        </form>
    </main>

    <nav>
        <a href="index.html">⬅ Voltar para o Cardápio</a>
    </nav>

</body>
</html>
